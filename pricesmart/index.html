    <style>
        body {
            font-family: 'Inter', sans-serif;

            height: 100vh;
            margin: 0;
            background: #f0f4f8;

            color: #17183a;
        }
        .loader-container { padding: 40px; }
        .spinner {
            border: 4px solid rgba(0, 0, 0, 0.1);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border-left-color: #24c9bd;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        a { color: #3795aa; text-decoration: none; font-weight: bold; }
    </style>
</head>
